<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel do Governador Galáctico</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #0b0d17; color: white; }
        .card { border: 1px solid #444; padding: 20px; margin: 20px auto; width: 300px; border-radius: 10px; }
        button { cursor: pointer; padding: 10px; margin: 5px; border-radius: 5px; border: none; font-weight: bold; }
        .btn-rad { background-color: #ff4444; color: white; }
        .btn-des { background-color: #44bb44; color: white; }
    </style>
</head>
<body>
    <h1>🚀 Mercado Galáctico</h1>
    <p>Bem-vindo, Governador. Escolha um evento para aplicar ao setor:</p>

    <div class="card">
        <h3>Setor: MINERAL</h3>
        <button class="btn-rad" onclick="enviar('RADIACAO', 'MINERAL')">Radiação (+15%)</button>
        <button class="btn-des" onclick="enviar('DESCOBERTA', 'MINERAL')">Descoberta (-15%)</button>
    </div>

    <script>
        function enviar(evento, setor) {
            fetch('/aplicar-evento', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ evento: evento, setor: setor })
            })
            .then(res => res.json())
            .then(data => alert(data.mensagem || data.erro))
            .catch(err => alert('Erro: ' + err));
        }
    </script>
</body>
</html>
